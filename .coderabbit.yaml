# CodeRabbit 리뷰 설정 — 결정 근거는 docs/adr/0007-coderabbit-review-config.md
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# 리뷰·요약·코멘트 출력 언어. 레포 전체가 한국어이고 PR 리뷰를 사람이 읽을
# 표면으로 삼으므로 한국어로 고정한다. (영어 출력의 미세한 정확도 이점보다
# "이해 가능성"을 우선)
language: "ko-KR"

reviews:
  # oxlint/oxfmt가 포맷·기본 정적 검사를 잡으므로, CodeRabbit은 설계·로직·
  # 접근성·도메인 위험에 집중한다. chill = 유의미한 이슈만, nit 폭격 지양.
  profile: "chill"

  # 미해결 코멘트로 머지를 막지 않는다. 현재 CI/required check가 없어
  # AI 오탐 하나가 머지를 봉쇄하는 것을 피한다. CI 도입 시 true로 재평가(ADR-0006 트리거).
  request_changes_workflow: false

  high_level_summary: true
  sequence_diagrams: true
  poem: false # 금융 도메인 공개 포폴 레포 톤에 맞지 않음

  # 레포 전체 공통 리뷰 관점. CLAUDE.md의 판단 원칙을 리뷰에 주입한다.
  instructions: |
    - 모든 리뷰 코멘트는 한국어로 작성한다.
    - 데이터·근거 없이 "이게 더 낫다"고 단정하지 말고, 확신 못 하는 부분은
      질문으로 남긴다. 과장·추정을 지양한다.
    - 이 레포는 한국 금융(증권) 디자인 시스템이다. 숫자·통화·날짜 포맷의 일관성,
      신뢰를 해치는 모호한 상태 표시(시세 신뢰 상태 등)에 민감하게 본다.
    - 접근성(대비비·키보드 내비게이션·ARIA·포커스 관리)과 다운스트림 파급 영향,
      breaking change 및 changeset 필요 여부를 의식한다.

  auto_review:
    enabled: true
    drafts: false # Codex 구현 중 WIP(Draft)에는 리뷰를 돌리지 않는다. "Ready for review" 전환 시 리뷰.

  # 리뷰에서 아예 제외할 경로. 락 파일·빌드 산출물·캐시·에이전트 운영 파일.
  path_filters:
    - "!pnpm-lock.yaml"
    - "!**/dist/**"
    - "!**/.turbo/**"
    - "!.claude/**"

  # 경로별 리뷰 관점. 현재 실재하는 경로에만 건다.
  # packages/** 컴포넌트 관점(접근성·토큰·도메인)은 첫 컴포넌트 패키지가 생기는
  # 시점에 ADR과 함께 추가한다(ADR-0006 보류 철학 일관). 예시:
  #   - path: "packages/**/*.{ts,tsx}"
  #     instructions: |
  #       - 의미 토큰만 사용하는지(raw 색상값·임의 픽셀 하드코딩 없음) 확인한다.
  #       - 색만으로 정보를 전달하지 않는지(부호·아이콘·라벨 병행) 확인한다.
  path_instructions:
    - path: "docs/**/*.md"
      instructions: |
        - 한국어 문서다. 기존 어투·용어집(CONTEXT.md)과 일관된 용어를 쓰는지 본다.
        - ADR이라면 결정·근거·트레이드오프·재평가 트리거가 빠지지 않았는지 본다.
    - path: ".changeset/*.md"
      instructions: |
        - 변경 범위(major/minor/patch)가 실제 변경의 영향과 맞는지,
          breaking change라면 마이그레이션 경로가 적혔는지 확인한다.

  tools:
    # oxlint: CodeRabbit 키는 oxc다. Biome이 켜져 있으면 oxlint가 돌지 않으므로 false/true를 함께 둔다.
    oxc:
      enabled: true
    biome:
      enabled: false
    # 공개 npm 레포라 시크릿 유출 방지를 켜둔다.
    gitleaks:
      enabled: true
    # 한국어 문서가 많아 줄길이·스타일 노이즈를 피하기 위해 끈다.
    markdownlint:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  # 공개 레포라 민감 데이터가 없고, ADR·도메인 용어 학습이 리뷰 품질을 높인다.
  opt_out: false
